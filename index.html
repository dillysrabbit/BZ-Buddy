<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#E7E4DE" />
  <title>BZ-Buddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Topbar -->
    <header id="topbar">
      <button id="backBtn" class="icon-btn" aria-label="Zurück" hidden>‹</button>
      <h1 id="title">BZ-Buddy</h1>
      <button id="settingsBtn" class="icon-btn" aria-label="Einstellungen">⚙</button>
    </header>

    <!-- View container -->
    <main id="view"></main>

    <!-- Floating action button -->
    <button id="fab" class="fab" aria-label="Hinzufügen" hidden>+</button>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
